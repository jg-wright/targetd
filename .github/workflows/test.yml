name: Test

on:
  workflow_call:

jobs:
  get-deno-version:
    uses: ./.github/workflows/get-deno-version.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: get-deno-version
    container:
      image: denoland/deno:${{ needs.get-deno-version.outputs.version }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/test
